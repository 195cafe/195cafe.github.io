<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>195 Café — Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --cream:#F7F0E6; --warm-white:#FDF9F4; --brown-light:#C8A882; --brown-mid:#9B7355; --brown-dark:#5C3D1E; --espresso:#2C1A0E; --gold:#D4A853; --text-body:#4A3728; --success:#2D6A4F; --danger:#9B2226; }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:"DM Sans",sans-serif;background:var(--warm-white);color:var(--text-body);min-height:100vh;}
  :lang(th){font-family:"Sarabun",sans-serif;}
  header{background:var(--espresso);position:sticky;top:0;z-index:50;box-shadow:0 2px 20px rgba(44,26,14,0.3);}
  .header-inner{display:flex;align-items:center;justify-content:space-between;padding:0.9rem 2rem;max-width:1100px;margin:0 auto;gap:1rem;}
  .header-brand{font-family:"Cormorant Garamond",serif;font-size:1.6rem;font-weight:600;color:var(--cream);text-decoration:none;}
  .header-brand span{color:var(--brown-light);}
  .header-tagline{font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(247,240,230,0.4);}
  .header-right{display:flex;align-items:center;gap:1rem;}
  .header-back{font-size:0.78rem;color:var(--brown-light);text-decoration:none;transition:color 0.2s;}
  .header-back:hover{color:var(--cream);}
  .lang-switcher{display:flex;border:1.5px solid rgba(200,168,130,0.4);border-radius:20px;overflow:hidden;}
  .lang-btn{padding:0.28rem 0.7rem;font-size:0.72rem;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--brown-light);font-family:"DM Sans",sans-serif;transition:all 0.15s;}
  .lang-btn.active{background:var(--brown-mid);color:white;}
  .lang-btn:hover:not(.active){background:rgba(200,168,130,0.2);}
  .menu-hero{background:linear-gradient(135deg,var(--espresso) 0%,#3D2010 60%,var(--brown-dark) 100%);padding:3rem 2rem 2.5rem;text-align:center;}
  .menu-hero-eyebrow{font-size:0.72rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--brown-light);margin-bottom:0.75rem;display:flex;align-items:center;justify-content:center;gap:0.75rem;}
  .menu-hero-eyebrow::before,.menu-hero-eyebrow::after{content:"";display:block;width:40px;height:1px;background:var(--brown-light);opacity:0.5;}
  .menu-hero-title{font-family:"Cormorant Garamond",serif;font-size:clamp(2.2rem,5vw,3.5rem);font-weight:300;color:var(--cream);margin-bottom:0.5rem;}
  .menu-hero-sub{font-size:0.88rem;color:rgba(247,240,230,0.5);font-weight:300;}
  .cat-nav-wrap{background:var(--warm-white);border-bottom:1px solid rgba(200,168,130,0.2);position:sticky;top:64px;z-index:40;}
  .cat-nav{display:flex;gap:0;overflow-x:auto;max-width:1100px;margin:0 auto;padding:0 1rem;scrollbar-width:none;}
  .cat-nav::-webkit-scrollbar{display:none;}
  .cat-nav-item{padding:0.9rem 1.25rem;font-size:0.8rem;font-weight:500;white-space:nowrap;color:var(--brown-mid);cursor:pointer;border-bottom:2.5px solid transparent;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem;}
  .cat-nav-item:hover{color:var(--brown-dark);}
  .cat-nav-item.active{color:var(--brown-dark);border-bottom-color:var(--brown-dark);}
  .search-bar-wrap{max-width:1100px;margin:1.5rem auto 0;padding:0 2rem;}
  .search-bar-inner{position:relative;}
  .search-bar{width:100%;padding:0.75rem 1rem 0.75rem 2.75rem;border:1.5px solid rgba(200,168,130,0.35);border-radius:50px;font-size:0.9rem;font-family:"DM Sans",sans-serif;background:var(--cream);color:var(--espresso);outline:none;transition:border-color 0.2s;}
  .search-bar:focus{border-color:var(--brown-mid);}
  .search-bar-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--brown-light);pointer-events:none;}
  .content{max-width:1100px;margin:0 auto;padding:2rem;}
  .cat-section{margin-bottom:3rem;scroll-margin-top:130px;}
  .cat-section-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;padding-bottom:0.75rem;border-bottom:2px solid rgba(200,168,130,0.2);}
  .cat-section-icon{font-size:1.5rem;}
  .cat-section-title{font-family:"Cormorant Garamond",serif;font-size:1.75rem;font-weight:400;color:var(--espresso);}
  .cat-section-count{font-size:0.75rem;color:var(--brown-light);background:rgba(200,168,130,0.15);padding:2px 10px;border-radius:10px;margin-left:auto;}
  .menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;}
  .menu-card{background:var(--warm-white);border-radius:14px;border:1px solid rgba(200,168,130,0.18);overflow:hidden;transition:transform 0.25s,box-shadow 0.25s;display:flex;flex-direction:column;}
  .menu-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(92,61,30,0.12);}
  .menu-card.sold-out{opacity:0.6;}
  .card-photos{position:relative;height:180px;background:var(--cream);overflow:hidden;cursor:pointer;}
  .card-photos img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity 0.4s;}
  .card-photo-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:2;}
  .card-photo-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.5);transition:background 0.2s;}
  .card-photo-dot.active{background:white;}
  .card-no-photo{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:0.5rem;}
  .card-no-photo-icon{font-size:2.5rem;opacity:0.35;}
  .card-no-photo-text{font-size:0.72rem;color:var(--brown-light);letter-spacing:0.1em;}
  .sold-out-ribbon{position:absolute;top:12px;right:-28px;background:var(--danger);color:white;font-size:0.65rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:3px 36px;transform:rotate(45deg);z-index:3;}
  .card-body{padding:1.1rem 1.25rem 1.25rem;flex:1;display:flex;flex-direction:column;}
  .card-name{font-family:"Cormorant Garamond",serif;font-size:1.15rem;font-weight:500;color:var(--espresso);margin-bottom:0.3rem;line-height:1.2;}
  .card-notes{font-size:0.78rem;color:var(--brown-mid);line-height:1.5;margin-bottom:0.75rem;flex:1;}
  .price-table{display:flex;gap:0.5rem;margin-top:auto;}
  .price-item{flex:1;text-align:center;background:var(--cream);border-radius:8px;padding:0.4rem 0.3rem;}
  .price-item-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--brown-light);display:block;margin-bottom:2px;}
  .price-item-val{font-size:0.9rem;font-weight:500;color:var(--brown-dark);}
  .price-item-val.na{color:var(--brown-light);font-size:0.8rem;}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem;}
  .lightbox.open{display:flex;}
  .lightbox-img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:8px;}
  .lightbox-close{position:absolute;top:1.25rem;right:1.25rem;background:rgba(255,255,255,0.15);color:white;border:none;width:40px;height:40px;border-radius:50%;font-size:1.1rem;cursor:pointer;}
  .lightbox-prev,.lightbox-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.15);color:white;border:none;width:44px;height:44px;border-radius:50%;font-size:1.1rem;cursor:pointer;}
  .lightbox-prev{left:1rem;} .lightbox-next{right:1rem;}
  .empty-menu{text-align:center;padding:5rem 2rem;}
  .empty-icon{font-size:3rem;margin-bottom:1rem;opacity:0.4;}
  .empty-title{font-family:"Cormorant Garamond",serif;font-size:1.5rem;color:var(--espresso);margin-bottom:0.5rem;}
  .empty-sub{font-size:0.88rem;color:var(--brown-light);}
  footer{background:var(--espresso);padding:2rem;text-align:center;margin-top:3rem;}
  .footer-brand-name{font-family:"Cormorant Garamond",serif;font-size:1.4rem;font-weight:300;color:var(--cream);margin-bottom:0.4rem;}
  .footer-brand-name span{color:var(--brown-light);}
  .footer-note{font-size:0.75rem;color:rgba(247,240,230,0.35);}
  @media(max-width:640px){.header-inner{padding:0.75rem 1rem;}.menu-hero{padding:2rem 1rem 1.75rem;}.search-bar-wrap{padding:0 1rem;}.content{padding:1.25rem 1rem;}.menu-grid{grid-template-columns:1fr 1fr;gap:0.75rem;}.card-photos{height:130px;}.card-body{padding:0.8rem 0.9rem 1rem;}.card-name{font-size:0.95rem;}.price-item-label{display:none;}.price-item-val{font-size:0.8rem;}}
  @media(max-width:380px){.menu-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <a class="header-brand" href="index.html">195 <span>Café</span></a>
      <div class="header-tagline" id="hdr-tagline"></div>
    </div>
    <div class="header-right">
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" data-lang="th" onclick="setLang('th')">TH</button>
      </div>
      <a class="header-back" href="index.html" id="back-link"></a>
    </div>
  </div>
</header>

<div class="menu-hero">
  <div class="menu-hero-eyebrow" id="hero-eyebrow"></div>
  <h1 class="menu-hero-title" id="hero-title"></h1>
  <p class="menu-hero-sub" id="hero-sub"></p>
</div>
<div class="cat-nav-wrap"><div class="cat-nav" id="cat-nav"></div></div>
<div class="search-bar-wrap">
  <div class="search-bar-inner">
    <span class="search-bar-icon">🔍</span>
    <input type="text" class="search-bar" id="search-bar" oninput="renderMenu()">
  </div>
</div>
<div class="content" id="menu-content"></div>
<footer>
  <div class="footer-brand-name">195 <span>Café</span></div>
  <div class="footer-note" id="footer-note"></div>
</footer>
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-prev" onclick="lightboxNav(-1,event)">‹</button>
  <img class="lightbox-img" id="lightbox-img" alt="">
  <button class="lightbox-next" onclick="lightboxNav(1,event)">›</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ─── SUPABASE ────────────────────────────────────────
const SB_URL = 'https://nczopypmbybjvkxqpxgy.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jem9weXBtYnlianZreHFweGd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjk3OTcsImV4cCI6MjA5NTgwNTc5N30.IpwzundkVF8nklpGmMnRRQZphe2T72qgWh5liDYxU4E';
const db = supabase.createClient(SB_URL, SB_KEY);

// ─── TRANSLATIONS ─────────────────────────────────────
const MT = {
  en: {
    tagline:'Specialty Coffee & Pastries',
    back:'← Back to Home',
    eyebrow:'What We Serve',
    title:'Our Menu',
    sub:'Everything made fresh — from your first sip to the last crumb',
    search:'Search menu items…',
    no_photo:'No photo yet',
    sold_out:'Sold Out',
    available:'available',
    footer:'Prices in Thai Baht (฿) · Menu subject to change',
    price_hot:'Hot', price_iced:'Iced', price_blend:'Blend',
    empty_title:'Nothing found', empty_sub:'Try a different search',
  },
  th: {
    tagline:'กาแฟพิเศษ & เพสตรี้',
    back:'← กลับหน้าหลัก',
    eyebrow:'สิ่งที่เราเสิร์ฟ',
    title:'เมนูของเรา',
    sub:'ทำสดทุกวัน — ตั้งแต่แก้วแรกจนถึงคำสุดท้าย',
    search:'ค้นหาเมนู…',
    no_photo:'ยังไม่มีรูปภาพ',
    sold_out:'หมด',
    available:'รายการ',
    footer:'ราคาเป็นบาท (฿) · เมนูอาจมีการเปลี่ยนแปลง',
    price_hot:'ร้อน', price_iced:'เย็น', price_blend:'ปั่น',
    empty_title:'ไม่พบรายการ', empty_sub:'ลองค้นหาคำอื่น',
  }
};

// ─── DATA ─────────────────────────────────────────────
let items = [], cats = [];
let lang  = localStorage.getItem('cafe195_lang') || 'en';

async function loadData() {
  const [catsRes, itemsRes] = await Promise.all([
    db.from('categories').select('*').order('sort_order'),
    db.from('menu_items').select('*'),
  ]);
  cats  = (catsRes.data||[]).map(c=>({...c, nameTh:c.name_th}));
  items = (itemsRes.data||[]).map(i=>({...i, nameTh:i.name_th, notesTh:i.notes_th, catId:i.cat_id, photos:i.photos||[]}));
}

// ─── HELPERS ─────────────────────────────────────────
function getName(obj) { return (lang==='th' && obj.nameTh) ? obj.nameTh : obj.name; }
function getNotes(obj) { return (lang==='th' && obj.notesTh) ? obj.notesTh : obj.notes; }

// ─── LANG SWITCH ────────────────────────────────────
function setLang(l) {
  lang = l;
  localStorage.setItem('cafe195_lang', l);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  document.documentElement.lang = l;
  const t = MT[l];
  document.getElementById('hdr-tagline').textContent = t.tagline;
  document.getElementById('back-link').textContent = t.back;
  document.getElementById('hero-eyebrow').textContent = t.eyebrow;
  document.getElementById('hero-title').textContent = t.title;
  document.getElementById('hero-sub').textContent = t.sub;
  document.getElementById('search-bar').placeholder = t.search;
  document.getElementById('footer-note').textContent = t.footer;
  renderMenu();
}

// ─── LIGHTBOX ────────────────────────────────────────
let lbPhotos=[], lbIndex=0;
function openLightbox(photos,idx){lbPhotos=photos;lbIndex=idx;document.getElementById('lightbox-img').src=lbPhotos[lbIndex];document.getElementById('lightbox').classList.add('open');document.body.style.overflow='hidden';}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}
function lightboxNav(dir,e){e.stopPropagation();lbIndex=(lbIndex+dir+lbPhotos.length)%lbPhotos.length;document.getElementById('lightbox-img').src=lbPhotos[lbIndex];}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();if(e.key==='ArrowLeft')lightboxNav(-1,e);if(e.key==='ArrowRight')lightboxNav(1,e);});

// ─── CAROUSEL ────────────────────────────────────────
const carouselState={};
function cyclePhoto(itemId,photos,dir,e){e.stopPropagation();const cur=carouselState[itemId]||0;carouselState[itemId]=(cur+dir+photos.length)%photos.length;updateCarousel(itemId,photos);}
function updateCarousel(itemId,photos){const idx=carouselState[itemId]||0;const c=document.querySelector('[data-item-id="'+itemId+'"]');if(!c)return;c.querySelectorAll('img').forEach((img,i)=>{img.style.opacity=i===idx?'1':'0';});c.querySelectorAll('.card-photo-dot').forEach((dot,i)=>{dot.classList.toggle('active',i===idx);});}

// ─── RENDER ──────────────────────────────────────────
function renderCatNav() {
  const q = document.getElementById('search-bar').value.toLowerCase();
  const t = MT[lang];
  const visibleCats = cats.filter(c => items.some(i => i.catId===c.id && !q || (getName(i).toLowerCase().includes(q))));
  document.getElementById('cat-nav').innerHTML = visibleCats.map(c =>
    `<a class="cat-nav-item" href="#cat-${c.id}">${c.icon} ${getName(c)}</a>`
  ).join('');
}

function renderMenu() {
  renderCatNav();
  const t = MT[lang];
  const q = document.getElementById('search-bar').value.toLowerCase();
  const filtered = items.filter(i => !q || getName(i).toLowerCase().includes(q));
  const sections = cats.map(cat => ({cat, items:filtered.filter(i=>i.catId===cat.id)})).filter(s=>s.items.length>0);
  const content = document.getElementById('menu-content');
  if (!sections.length) {
    content.innerHTML = `<div class="empty-menu"><div class="empty-icon">☕</div><div class="empty-title">${t.empty_title}</div><div class="empty-sub">${t.empty_sub}</div></div>`;
    return;
  }
  content.innerHTML = sections.map(({cat, items:catItems}) => `
    <div class="cat-section" id="cat-${cat.id}">
      <div class="cat-section-header">
        <span class="cat-section-icon">${cat.icon}</span>
        <h2 class="cat-section-title">${getName(cat)}</h2>
        <span class="cat-section-count">${catItems.filter(i=>i.available).length} ${t.available}</span>
      </div>
      <div class="menu-grid">${catItems.map(item=>renderCard(item,t)).join('')}</div>
    </div>
  `).join('');
}

function renderCard(item, t) {
  const photos = (item.photos||[]).filter(Boolean);
  const hasPhotos = photos.length > 0;
  let photoHTML = '';
  if (hasPhotos) {
    const imgs = photos.map((src,i)=>`<img src="${src}" alt="${getName(item)}" style="opacity:${i===0?1:0};" onclick="openLightbox(${JSON.stringify(photos)},${i})">`).join('');
    const dots = photos.length>1 ? `<div class="card-photo-dots">${photos.map((_,i)=>`<div class="card-photo-dot ${i===0?'active':''}"></div>`).join('')}</div>` : '';
    const nav = photos.length>1 ? `<button style="position:absolute;left:6px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.35);color:white;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:0.9rem;z-index:2;" onclick="cyclePhoto('${item.id}',${JSON.stringify(photos)},-1,event)">‹</button><button style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.35);color:white;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:0.9rem;z-index:2;" onclick="cyclePhoto('${item.id}',${JSON.stringify(photos)},1,event)">›</button>` : '';
    photoHTML = `<div class="card-photos" data-item-id="${item.id}">${imgs}${dots}${nav}${!item.available?`<div class="sold-out-ribbon">${t.sold_out}</div>`:''}</div>`;
  } else {
    photoHTML = `<div class="card-photos" style="cursor:default;">${!item.available?`<div class="sold-out-ribbon">${t.sold_out}</div>`:''}<div class="card-no-photo"><div class="card-no-photo-icon">☕</div><div class="card-no-photo-text">${t.no_photo}</div></div></div>`;
  }
  const notes = getNotes(item);
  const prices = [{label:t.price_hot,val:item.hot},{label:t.price_iced,val:item.iced},{label:t.price_blend,val:item.blend}].filter(p=>p.val!=null).map(p=>`<div class="price-item"><span class="price-item-label">${p.label}</span><span class="price-item-val">${p.val}฿</span></div>`).join('');
  return `<div class="menu-card ${!item.available?'sold-out':''}">${photoHTML}<div class="card-body"><div class="card-name">${getName(item)}</div>${notes?`<div class="card-notes">${notes}</div>`:''}<div class="price-table">${prices}</div></div></div>`;
}

// ─── INIT ────────────────────────────────────────────
loadData().then(() => setLang(lang));
// Refresh from Supabase every 30s
setInterval(() => loadData().then(renderMenu), 30000);
</script>
</body>
</html>
