<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>195 Café — Expense Summary</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--cream:#F7F0E6;--warm-white:#FDF9F4;--brown-light:#C8A882;--brown-mid:#9B7355;--brown-dark:#5C3D1E;--espresso:#2C1A0E;--text-body:#4A3728;--success:#2D6A4F;--success-bg:#D8F3DC;--danger:#9B2226;--danger-bg:#FFE8E8;--sidebar-w:240px;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:"DM Sans",sans-serif;background:var(--cream);color:var(--text-body);}
#app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:var(--sidebar-w);background:var(--espresso);color:var(--cream);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.sidebar-brand{padding:1.5rem 1.25rem 1rem;border-bottom:1px solid rgba(255,255,255,0.08);}
.sidebar-brand-name{font-family:"Cormorant Garamond",serif;font-size:1.4rem;font-weight:600;}
.sidebar-brand-name span{color:var(--brown-light);}
.sidebar-brand-sub{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(247,240,230,0.35);margin-top:2px;}
.sidebar-section{padding:1rem 0.75rem 0.5rem;font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:rgba(247,240,230,0.3);}
.sidebar-link{display:flex;align-items:center;gap:0.75rem;padding:0.65rem 1.25rem;font-size:0.85rem;color:rgba(247,240,230,0.65);cursor:pointer;transition:all 0.15s;border-left:3px solid transparent;text-decoration:none;}
.sidebar-link:hover{background:rgba(255,255,255,0.06);color:var(--cream);}
.sidebar-link.active{background:rgba(200,168,130,0.15);color:var(--cream);border-left-color:var(--brown-light);}
.sidebar-link .icon{font-size:1rem;width:20px;text-align:center;}
.sidebar-footer{margin-top:auto;padding:1rem 1.25rem;border-top:1px solid rgba(255,255,255,0.08);}
.back-btn-side{font-size:0.75rem;color:rgba(247,240,230,0.4);cursor:pointer;background:none;border:none;font-family:"DM Sans",sans-serif;display:flex;align-items:center;gap:0.5rem;}
.back-btn-side:hover{color:var(--brown-light);}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.topbar{background:var(--warm-white);border-bottom:1px solid rgba(200,168,130,0.2);padding:1.25rem 2rem;position:sticky;top:0;z-index:10;flex-shrink:0;}
.topbar-title{font-family:"Cormorant Garamond",serif;font-size:1.6rem;font-weight:500;color:var(--espresso);}
.topbar-sub{font-size:0.75rem;color:var(--brown-light);margin-top:2px;}
.content{padding:1.5rem 2rem;flex:1;}
.period-bar{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;}
.period-btn{padding:0.45rem 1rem;border-radius:20px;font-size:0.8rem;font-weight:500;cursor:pointer;border:1.5px solid rgba(200,168,130,0.3);background:var(--warm-white);color:var(--brown-mid);transition:all 0.15s;font-family:"DM Sans",sans-serif;}
.period-btn:hover,.period-btn.active{background:var(--brown-dark);color:var(--cream);border-color:var(--brown-dark);}
.date-inputs{display:flex;gap:0.5rem;align-items:center;}
.date-input{padding:0.45rem 0.8rem;border:1.5px solid rgba(200,168,130,0.3);border-radius:8px;font-size:0.8rem;font-family:"DM Sans",sans-serif;background:var(--warm-white);color:var(--text-body);outline:none;}
.date-sep{font-size:0.8rem;color:var(--brown-light);}
.apply-btn{padding:0.45rem 1rem;border-radius:8px;background:var(--brown-dark);color:var(--cream);border:none;font-size:0.8rem;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
.stat-card{background:var(--warm-white);border-radius:14px;padding:1.25rem 1.5rem;border:1px solid rgba(200,168,130,0.2);}
.stat-label{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.14em;color:var(--brown-light);margin-bottom:0.5rem;}
.stat-val{font-family:"DM Sans",sans-serif;font-size:2rem;font-weight:700;color:var(--espresso);line-height:1;letter-spacing:-0.02em;}
.stat-sub{font-size:0.75rem;color:var(--brown-mid);margin-top:5px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.5rem;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.25rem;margin-bottom:1.5rem;}
.panel{background:var(--warm-white);border-radius:14px;padding:1.5rem;border:1px solid rgba(200,168,130,0.2);}
.panel-title{font-family:"Cormorant Garamond",serif;font-size:1.1rem;font-weight:500;color:var(--espresso);margin-bottom:1rem;}
.bar-row{display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0;border-bottom:1px solid rgba(200,168,130,0.08);}
.bar-row:last-child{border-bottom:none;}
.bar-row-label{font-size:0.82rem;font-weight:500;color:var(--espresso);min-width:140px;}
.bar-track{flex:1;height:8px;background:rgba(200,168,130,0.15);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width 0.4s;}
.bar-count{font-size:0.7rem;color:var(--brown-light);min-width:36px;text-align:right;}
.bar-val{font-size:0.85rem;font-weight:700;color:var(--espresso);min-width:70px;text-align:right;}
.daily-row{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.4rem;}
.daily-date{font-size:0.72rem;color:var(--brown-mid);min-width:80px;text-align:right;}
.daily-track{flex:1;height:20px;background:rgba(200,168,130,0.12);border-radius:5px;overflow:hidden;}
.daily-fill{height:100%;background:var(--brown-mid);border-radius:5px;transition:width 0.4s;}
.daily-val{font-size:0.78rem;font-weight:600;color:var(--espresso);min-width:64px;}
.empty-state{text-align:center;padding:2.5rem;color:var(--brown-light);font-size:0.88rem;}
/* Bar colours */
.c-ing{background:#F59E0B;} .c-pkg{background:#8B5CF6;} .c-rent{background:#3B82F6;}
.c-maint{background:#EC4899;} .c-soft{background:#10B981;} .c-other{background:var(--brown-mid);}
.c-cash{background:#10B981;} .c-bank{background:#3B82F6;} .c-personal{background:#F59E0B;}
.c-cafe{background:#10B981;} .c-kiang{background:#8B5CF6;} .c-rat{background:#3B82F6;} .c-ying{background:#F59E0B;}
@media(max-width:900px){.stats-grid{grid-template-columns:1fr 1fr;}.two-col,.three-col{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="app">
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-name">195 <span>Café</span></div>
      <div class="sidebar-brand-sub">Management System</div>
    </div>
    <div class="sidebar-section">Orders</div>
    <a class="sidebar-link" href="order.html#list"><span class="icon">🧾</span> Orders</a>
    <div class="sidebar-section">Menu</div>
    <a class="sidebar-link" href="menu-admin.html"><span class="icon">☕</span> Products & Menu</a>
    <div class="sidebar-section">Finance</div>
    <a class="sidebar-link" href="expenses.html"><span class="icon">💰</span> Expenses</a>
    <div class="sidebar-section">Reports</div>
    <a class="sidebar-link" href="dashboard.html"><span class="icon">📊</span> Order Summary</a>
    <a class="sidebar-link active" href="expense-summary.html"><span class="icon">📈</span> Expense Summary</a>
    <div class="sidebar-footer">
      <button class="back-btn-side" onclick="window.location.href='menu-admin.html'">⬅ Back to Admin</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Expense Summary</div>
      <div class="topbar-sub" id="topbar-sub">This month's breakdown</div>
    </div>
    <div class="content">

      <!-- Period filter -->
      <div class="period-bar">
        <button class="period-btn" data-p="today"  onclick="setPeriod('today')">Today</button>
        <button class="period-btn" data-p="week"   onclick="setPeriod('week')">This Week</button>
        <button class="period-btn active" data-p="month"  onclick="setPeriod('month')">This Month</button>
        <button class="period-btn" data-p="custom" onclick="setPeriod('custom')">Custom Range</button>
        <div class="date-inputs" id="custom-inputs" style="display:none;">
          <input type="date" class="date-input" id="date-from">
          <span class="date-sep">→</span>
          <input type="date" class="date-input" id="date-to">
          <button class="apply-btn" onclick="render()">Apply</button>
        </div>
      </div>

      <!-- Stat cards -->
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total Spent</div><div class="stat-val" id="s-total">฿0</div><div class="stat-sub" id="s-total-sub"></div></div>
        <div class="stat-card"><div class="stat-label">Records</div><div class="stat-val" id="s-count">0</div><div class="stat-sub" id="s-count-sub"></div></div>
        <div class="stat-card"><div class="stat-label">Avg per Record</div><div class="stat-val" id="s-avg">฿0</div><div class="stat-sub">average</div></div>
        <div class="stat-card"><div class="stat-label">Largest Expense</div><div class="stat-val" id="s-max">฿0</div><div class="stat-sub" id="s-max-sub"></div></div>
      </div>

      <!-- Category + Daily -->
      <div class="two-col">
        <div class="panel"><div class="panel-title">By Category</div><div id="cat-breakdown"></div></div>
        <div class="panel"><div class="panel-title">Daily Spend</div><div id="daily-chart"></div></div>
      </div>

      <!-- Payment method + Paid by -->
      <div class="two-col">
        <div class="panel"><div class="panel-title">By Payment Method</div><div id="payment-breakdown"></div></div>
        <div class="panel"><div class="panel-title">By Paid By</div><div id="paidby-breakdown"></div></div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL = 'https://nczopypmbybjvkxqpxgy.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jem9weXBtYnlianZreHFweGd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjk3OTcsImV4cCI6MjA5NTgwNTc5N30.IpwzundkVF8nklpGmMnRRQZphe2T72qgWh5liDYxU4E';
const db = supabase.createClient(SB_URL, SB_KEY);

let expenses = [];
let period   = 'month';

const CAT_COLORS = {
  'Ingredients':'c-ing','Packaging':'c-pkg','Rent & Utilities':'c-rent',
  'Maintenance':'c-maint','Software & Fees':'c-soft','Other':'c-other',
};
const PAY_COLORS  = {'Cafe Cash':'c-cash','Cafe Bank Account':'c-bank','Personal Money':'c-personal'};
const PB_COLORS   = {'195 Cafe':'c-cafe','Kiang':'c-kiang','Rat':'c-rat','Ying':'c-ying'};

async function loadAndRender() {
  const { data } = await db.from('expenses').select('*');
  expenses = data || [];
  render();
}

function setPeriod(p) {
  period = p;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.toggle('active',b.dataset.p===p));
  document.getElementById('custom-inputs').style.display = p==='custom' ? 'flex' : 'none';
  if(p !== 'custom') render();
}

function getRange() {
  const now   = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString().slice(0,10);
  if(period==='today') return { from:today, to:today };
  if(period==='week'){
    const ws = new Date(now); ws.setDate(now.getDate()-now.getDay());
    return { from:ws.toISOString().slice(0,10), to:today };
  }
  if(period==='month') return { from:new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10), to:today };
  if(period==='custom') return { from:document.getElementById('date-from').value, to:document.getElementById('date-to').value };
  return { from:today, to:today };
}

function render() {
  const range    = getRange(); if(!range.from||!range.to) return;
  const filtered = expenses.filter(e=>e.date>=range.from&&e.date<=range.to);
  const total    = filtered.reduce((s,e)=>s+parseFloat(e.amount),0);
  const count    = filtered.length;
  const avg      = count ? Math.round(total/count) : 0;
  const maxE     = filtered.reduce((m,e)=>parseFloat(e.amount)>parseFloat(m?.amount||0)?e:m, null);

  const lblMap   = {'today':"Today's expenses",'week':"This week's expenses",'month':"This month's expenses",'custom':`${range.from} → ${range.to}`};
  document.getElementById('topbar-sub').textContent = lblMap[period]||'';
  document.getElementById('s-total').textContent    = '฿'+total.toLocaleString();
  document.getElementById('s-total-sub').textContent= count ? `${count} record${count!==1?'s':''}` : 'no records';
  document.getElementById('s-count').textContent    = count;
  document.getElementById('s-count-sub').textContent= count===1?'1 record':`${count} records`;
  document.getElementById('s-avg').textContent      = '฿'+avg.toLocaleString();
  document.getElementById('s-max').textContent      = maxE ? '฿'+parseFloat(maxE.amount).toLocaleString() : '฿0';
  document.getElementById('s-max-sub').textContent  = maxE ? (maxE.expense_name||maxE.note||'') : '';

  renderBreakdown('cat-breakdown',   filtered, 'category',       total, CAT_COLORS);
  renderBreakdown('payment-breakdown',filtered, 'payment_method', total, PAY_COLORS);
  renderBreakdown('paidby-breakdown', filtered, 'paid_by',        total, PB_COLORS);
  renderDaily(filtered);
}

function renderBreakdown(elId, data, field, total, colorMap) {
  const map = {};
  data.forEach(e=>{ const k=e[field]||'Other'; map[k]=map[k]||{total:0,count:0}; map[k].total+=parseFloat(e.amount); map[k].count++; });
  const entries = Object.entries(map).sort((a,b)=>b[1].total-a[1].total);
  const el = document.getElementById(elId);
  if(!entries.length){ el.innerHTML='<div class="empty-state">No data</div>'; return; }
  el.innerHTML = entries.map(([key,d])=>{
    const pct = total ? Math.round(d.total/total*100) : 0;
    const cls = colorMap[key]||'c-other';
    return `<div class="bar-row">
      <div class="bar-row-label">${key}</div>
      <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
      <div class="bar-count">${d.count}×</div>
      <div class="bar-val">฿${d.total.toLocaleString()}</div>
    </div>`;
  }).join('');
}

function renderDaily(data) {
  const dayMap = {};
  data.forEach(e=>{ dayMap[e.date]=(dayMap[e.date]||0)+parseFloat(e.amount); });
  const entries = Object.entries(dayMap).sort((a,b)=>a[0].localeCompare(b[0]));
  const maxVal  = Math.max(...entries.map(d=>d[1]),1);
  const el = document.getElementById('daily-chart');
  if(!entries.length){ el.innerHTML='<div class="empty-state">No data</div>'; return; }
  el.innerHTML = entries.map(([date,amt])=>{
    const d = new Date(date+'T00:00:00');
    const label = d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
    return `<div class="daily-row">
      <div class="daily-date">${label}</div>
      <div class="daily-track"><div class="daily-fill" style="width:${Math.round(amt/maxVal*100)}%"></div></div>
      <div class="daily-val">฿${amt.toLocaleString()}</div>
    </div>`;
  }).join('');
}

const t = new Date().toISOString().slice(0,10);
document.getElementById('date-from').value = t;
document.getElementById('date-to').value   = t;
loadAndRender();
</script>
</body>
</html>
